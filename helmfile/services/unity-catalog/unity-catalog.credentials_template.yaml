# Copy this file to unity-catalog.credentials.yaml, replace placeholders,
# then encrypt with SOPS before applying to cluster.
apiVersion: v1
kind: Secret
metadata:
  name: uc-postgres
  namespace: unity-catalog
type: Opaque
stringData:
  password: UC_POSTGRES_PASSWORD

# uc-minio is mirrored from ampere/minio-creds during the unity-catalog
# helmfile preapply hook and should not be maintained as a second secret here.
